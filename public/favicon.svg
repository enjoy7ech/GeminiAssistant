<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#glowGradient)" stroke-width="20" opacity="0.4" />
  
  <!-- Inner Star / Diamond Shape representing Gemini Brilliance -->
  <path d="M256 60 L300 210 L450 256 L300 302 L256 452 L212 302 L62 256 L212 210 Z" fill="url(#glowGradient)" filter="url(#glow)" />
  
  <!-- Secondary smaller stars for the "Twins" / Gemini concept -->
  <circle cx="160" cy="160" r="25" fill="#ffffff" opacity="0.8" />
  <circle cx="352" cy="352" r="20" fill="#ffffff" opacity="0.6" />
</svg>